services:
  postgres:
    image: postgres:16-alpine
    container_name: stage_postgres
    environment:
      POSTGRES_DB: ${STAGE_DB_NAME:-shop}
      POSTGRES_USER: ${STAGE_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${STAGE_DB_PASSWORD:-stagepostgres}
    networks:
      - stage_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STAGE_DB_USER:-postgres} -d ${STAGE_DB_NAME:-shop}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: stage_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${STAGE_RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${STAGE_RABBITMQ_PASSWORD:-guest}
    networks:
      - stage_internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: lecture17-orders-api:${STAGE_IMAGE_TAG:-latest}
    container_name: stage_migrate
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${STAGE_DB_NAME:-shop}
      DB_USERNAME: ${STAGE_DB_USER:-postgres}
      DB_PASSWORD: ${STAGE_DB_PASSWORD:-stagepostgres}
    networks:
      - stage_internal
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "migration:run:prod"]
    restart: "no"

  orders-api:
    image: lecture17-orders-api:${STAGE_IMAGE_TAG:-latest}
    container_name: stage_orders_api
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${STAGE_DB_NAME:-shop}
      DB_USERNAME: ${STAGE_DB_USER:-postgres}
      DB_PASSWORD: ${STAGE_DB_PASSWORD:-stagepostgres}
      JWT_SECRET: ${STAGE_JWT_SECRET:-stage-jwt-secret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${STAGE_RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${STAGE_RABBITMQ_PASSWORD:-guest}
      PAYMENTS_GRPC_URL: payments:5001
    ports:
      - "${STAGE_ORDERS_PORT:-8080}:3000"
    networks:
      - stage_internal
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      payments:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 5

  payments:
    image: lecture17-payments:${STAGE_IMAGE_TAG:-latest}
    container_name: stage_payments
    environment:
      NODE_ENV: production
      GRPC_URL: "0.0.0.0:5001"
      HTTP_PORT: "3001"
    networks:
      - stage_internal
    expose:
      - "5001"
      - "3001"
    restart: unless-stopped

  worker:
    image: lecture17-orders-api:${STAGE_IMAGE_TAG:-latest}
    container_name: stage_worker
    command: ["node", "dist/main.worker"]
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${STAGE_DB_NAME:-shop}
      DB_USERNAME: ${STAGE_DB_USER:-postgres}
      DB_PASSWORD: ${STAGE_DB_PASSWORD:-stagepostgres}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${STAGE_RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${STAGE_RABBITMQ_PASSWORD:-guest}
    networks:
      - stage_internal
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

networks:
  stage_internal:
    driver: bridge
